  <script>
    // Embedded Code database
    const filesDb = {"README.md": "# Clausely \u2014 Legal Compilation Engine for India\n\n### Google for Startups AI Agents Challenge 2026\n\n**Track:** Build Net-New Agent  \n**Prize Pool:** $90,000  \n\n---\n\n## The Problem\n\nIndian courts reject **8\u201315% of legal filings** for preventable formatting errors.  \n**1.7 million advocates. 200+ million documents per year. Zero AI tools designed for Indian courts.**\n\nA cheque dishonour notice with 2.8cm margins instead of 3.0cm gets returned at the registry counter. An affidavit without a verification clause is rejected on the spot. Every rejection costs an advocate time, money, and reputation.\n\n## What Clausely Does\n\nClausely is a **legal compilation engine** \u2014 it **compiles** legal intent into deterministic, registry-accepted court documents. Unlike generic AI tools that generate text, Clausely generates **validated legal artifacts**.\n\nThink of it as a **compiler for law**: natural language goes in, court-ready documents come out.\n\n```\nLegal Intent \u2192 [Clausely ADK Pipeline] \u2192 Court-Ready Document\n                    \u251c\u2500\u2500 Drafter Agent (Gemini 1.5 Flash)\n                    \u251c\u2500\u2500 Acceptor Agent (Registry Simulation)\n                    \u251c\u2500\u2500 Strategist (7-Agent Adversarial Swarm)\n                    \u2514\u2500\u2500 Case Base (Firestore Memory Bank)\n```\n\n## Google ADK Architecture\n\nClausely uses **4 ADK agents** coordinated by a `SequentialAgent` orchestrator:\n\n```\nclausely_orchestrator (SequentialAgent)\n\u251c\u2500\u2500 case_base_agent      \u2192 ADK Memory Bank + Firestore\n\u251c\u2500\u2500 drafter_agent        \u2192 Gemini 1.5 Flash + SFE tools\n\u251c\u2500\u2500 acceptor_agent       \u2192 Registry simulation + procedural linting\n\u2514\u2500\u2500 strategist_agent     \u2192 ParallelAgent (7-agent adversarial swarm)\n    \u251c\u2500\u2500 petitioner_agent \u2192 Argues strongest case\n    \u251c\u2500\u2500 opponent_agent   \u2192 Finds every weakness\n    \u251c\u2500\u2500 reviewer_agent   \u2192 Checks legal accuracy\n    \u251c\u2500\u2500 verifier_agent   \u2192 Verifies statute citations\n    \u251c\u2500\u2500 objector_agent   \u2192 Procedural objections\n    \u251c\u2500\u2500 presenter_agent  \u2192 Strategy synthesis\n    \u2514\u2500\u2500 judge_agent      \u2192 Scores probability of success\n```\n\n## ADK Features Used\n\n| ADK Feature | How Clausely Uses It |\n|---|---|\n| `SequentialAgent` | Orchestrates intake \u2192 draft \u2192 validate \u2192 store pipeline |\n| `ParallelAgent` | Runs 7 adversarial agents simultaneously in Strategist |\n| `Agent` with `FunctionTool` | Drafter, Acceptor, Case Base agents with custom tools |\n| `InMemorySessionService` | Session management for stateful agent conversations |\n| `Runner` | Executes the multi-agent pipeline end-to-end |\n\n## The Core Innovation \u2014 Symbolic Formatting Engine (SFE)\n\nThe SFE is **NOT an LLM**. It is a **deterministic rule engine** that enforces court formatting as immutable constraints.\n\n```\nLLM generates content \u2192 SFE enforces format \u2192 Registry accepts document\n```\n\nThis is the architectural insight: **separate the probabilistic generation problem from the deterministic formatting problem**. Solve each with the right tool.\n\nThe SFE enforces:\n- **Exact margins** (3.0cm left, 2.5cm right for Maharashtra District Courts)\n- **Correct fonts** (Times New Roman, 14pt body)\n- **Line spacing** (1.5\u00d7 for District, 2.0\u00d7 for High Court)\n- **Mandatory sections** (cause title, verification, prayer, etc.)\n- **Stamp paper values** (\u20b9100 for MH-District, \u20b910 for Delhi)\n- **Section ordering** (court-mandated sequence)\n\n## The Moat \u2014 Self-Evolving RL Pipeline\n\nEvery filing outcome feeds back into the system:\n\n| Outcome | Reward Signal |\n|---------|---------------|\n| Registry accepted | **+3.0** |\n| Document filed | +0.5 |\n| Minor advocate edit | +0.5 |\n| Major advocate edit | +0.2 |\n| Registry rejected | **-3.0** |\n\nThese signals accumulate in Firestore and compound over time. The system gets more accurate with every Indian court filing. **The moat deepens with every user.**\n\n## Business Case\n\n| Metric | Value |\n|--------|-------|\n| **Market** | India, 1.7M advocates, \u20b935,000 Crore legal services market |\n| **Problem** | \u20b90 spent on legal tech per document currently. All manual. |\n| **Price** | \u20b9999/month (Advocate) \u00b7 \u20b94,999/month (Chambers) \u00b7 $200/seat (Enterprise) |\n| **CAC** | \u20b92,000 via bar association partnerships |\n| **LTV** | \u20b936,000 (3-year) |\n| **Founder** | Manas Khobrekar, Nagpur. Built for his mother \u2014 a practicing advocate. |\n\n## Supported Jurisdictions\n\n- \ud83c\udfdb\ufe0f Maharashtra District Court (`MH-DISTRICT`)\n- \ud83c\udfdb\ufe0f Bombay High Court (`MH-HC`)\n- \ud83c\udfdb\ufe0f Delhi District Court (`DL-DISTRICT`)\n- \ud83c\udfdb\ufe0f Supreme Court of India (`IN-SC`)\n\n## Tech Stack\n\n- **Backend:** Python 3.11, FastAPI, Google ADK\n- **AI:** Gemini 1.5 Flash (drafting & strategy analysis)\n- **Frontend:** Streamlit (demo) \n- **Database:** Firestore (Case Base + Reward Signals)\n- **Deployment:** Google Cloud Run\n- **Export:** PDF (ReportLab) + DOCX (python-docx)\n\n## How to Run\n\n```bash\n# Clone\ngit clone https://github.com/[username]/clausely-adk\ncd clausely-adk\n\n# Create virtual environment\npython -m venv .venv\n.venv\\Scripts\\activate  # Windows\n# source .venv/bin/activate  # Linux/Mac\n\n# Install dependencies\npip install -r requirements.txt\n\n# Set credentials\ncp .env.example .env\n# Edit .env with your GOOGLE_API_KEY\n\n# Run Streamlit demo\nstreamlit run app/streamlit_app.py\n\n# Or run FastAPI backend\nuvicorn app.main:app --reload --port 8080\n\n# Run tests\npytest tests/ -v\n```\n\n## Deployment (Cloud Run)\n\n```bash\n# Build and deploy\ngcloud builds submit --config cloudbuild.yaml\n\n# Or manual Docker deploy\ndocker build -t clausely-adk .\ndocker run -p 8080:8080 clausely-adk\n```\n\n## API Endpoints\n\n| Endpoint | Method | Description |\n|----------|--------|-------------|\n| `/api/v1/compile` | POST | Full ADK multi-agent compilation |\n| `/api/v1/validate` | POST | Quick SFE-only validation |\n| `/api/v1/export` | POST | PDF/DOCX export |\n| `/api/v1/reward` | POST | Log RL reward signal |\n| `/api/v1/stats` | GET | Aggregate reward statistics |\n| `/api/v1/jurisdictions` | GET | List supported jurisdictions |\n| `/health` | GET | Health check |\n\n## Project Structure\n\n```\nclausely-adk/\n\u251c\u2500\u2500 agents/                 # ADK Agent definitions\n\u2502   \u251c\u2500\u2500 orchestrator.py     # Root SequentialAgent\n\u2502   \u251c\u2500\u2500 drafter.py          # Document generation agent\n\u2502   \u251c\u2500\u2500 acceptor.py         # Registry simulation agent\n\u2502   \u251c\u2500\u2500 strategist.py       # 7-agent adversarial swarm\n\u2502   \u2514\u2500\u2500 case_base.py        # Firestore memory agent\n\u251c\u2500\u2500 tools/                  # Core tools & engines\n\u2502   \u251c\u2500\u2500 sfe.py              # Symbolic Formatting Engine (THE moat)\n\u2502   \u251c\u2500\u2500 legal_ast.py        # Legal Abstract Syntax Tree\n\u2502   \u251c\u2500\u2500 registry_rules.py   # Court filing rules database\n\u2502   \u251c\u2500\u2500 corpus_client.py    # IndianKanoon API wrapper\n\u2502   \u2514\u2500\u2500 reward_signal.py    # RL reward signal logger\n\u251c\u2500\u2500 data/                   # Court rules & templates\n\u2502   \u251c\u2500\u2500 court_formats/      # JSON rules per jurisdiction\n\u2502   \u2514\u2500\u2500 templates/          # Document templates\n\u251c\u2500\u2500 app/                    # Application interfaces\n\u2502   \u251c\u2500\u2500 main.py             # FastAPI backend\n\u2502   \u2514\u2500\u2500 streamlit_app.py    # Streamlit demo frontend\n\u251c\u2500\u2500 tests/                  # Test suite\n\u251c\u2500\u2500 demo/                   # Demo materials\n\u251c\u2500\u2500 Dockerfile              # Cloud Run container\n\u251c\u2500\u2500 cloudbuild.yaml         # CI/CD config\n\u2514\u2500\u2500 requirements.txt        # Python dependencies\n```\n\n---\n\n**Built with \u2764\ufe0f in Nagpur, India.**  \n*For every advocate who ever got a filing rejected for the wrong margin.*\n", "agents/orchestrator.py": "\"\"\"\nClausely Orchestrator \u2014 Root ADK Agent.\n\nCoordinates the 4 sub-agents using ADK's SequentialAgent:\n    1. Case Base Agent  \u2192 retrieves similar matters & firm playbook\n    2. Drafter Agent    \u2192 generates the legal document\n    3. Acceptor Agent   \u2192 simulates registry scrutiny\n    4. Case Base Agent  \u2192 stores the completed matter\n\nThe Strategist (7-agent swarm) can be invoked optionally for\nfull adversarial analysis.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport json\nimport logging\nimport uuid\nfrom typing import Any, Dict, Optional\n\nfrom google.adk.agents import Agent\nfrom google.adk.tools import FunctionTool\nfrom google.adk.runners import Runner\nfrom google.adk.sessions import InMemorySessionService\nfrom google.adk import Workflow\nfrom google.adk.workflow import Edge, START\n\nfrom agents.drafter import drafter_agent\nfrom agents.acceptor import acceptor_agent\nfrom agents.strategist import strategist_agent\nfrom agents.case_base import case_base_agent\n\nlogger = logging.getLogger(\"clausely.orchestrator\")\n\n\n# ---------------------------------------------------------------------------\n# Root Orchestrator \u2014 Workflow\n# ---------------------------------------------------------------------------\n\nclausely_orchestrator = Workflow(\n    name=\"clausely_orchestrator\",\n    description=(\n        \"Root orchestrator for Clausely Legal AI. Compiles legal intent \"\n        \"into court-accepted documents by coordinating the Drafter, \"\n        \"Acceptor, Strategist, and Case Base agents in sequence.\"\n    ),\n    edges=[\n        Edge(from_node=START, to_node=case_base_agent),\n        Edge(from_node=case_base_agent, to_node=drafter_agent),\n        Edge(from_node=drafter_agent, to_node=acceptor_agent),\n    ],\n)\n\n\n# ---------------------------------------------------------------------------\n# Runner helper \u2014 executes the full pipeline\n# ---------------------------------------------------------------------------\n\nasync def run_clausely(\n    runner: Runner,\n    matter_context: Dict[str, Any],\n    run_strategy: bool = False,\n) -> Dict[str, Any]:\n    \"\"\"\n    Execute the full Clausely multi-agent pipeline.\n\n    Args:\n        runner: ADK Runner instance\n        matter_context: Dict with jurisdiction, document_type, facts, etc.\n        run_strategy: Whether to also run the 7-agent strategist swarm\n\n    Returns:\n        Complete result dict with document, scores, defects, etc.\n    \"\"\"\n    from engine.intake_serialization import preprocess_secure_intake\n    matter_context = preprocess_secure_intake(matter_context)\n\n    matter_id = f\"CLY-{uuid.uuid4().hex[:8].upper()}\"\n\n    # Build the input prompt for the orchestrator\n    prompt = _build_orchestrator_prompt(matter_context, matter_id)\n\n    # Create a session\n    session = await runner.session_service.create_session(\n        app_name=\"clausely\",\n        user_id=\"clausely_user\",\n    )\n\n    # Execute the agent pipeline\n    from google.genai import types as genai_types\n\n    result_text = \"\"\n    async for event in runner.run_async(\n        session_id=session.id,\n        user_id=\"clausely_user\",\n        new_message=genai_types.Content(\n            role=\"user\",\n            parts=[genai_types.Part(text=prompt)],\n        ),\n    ):\n        if event.is_final_response():\n            if event.content and event.content.parts:\n                result_text = event.content.parts[0].text\n            break\n\n    from engine.aeds_sentinel import AEDSSentinel\n    result_text = AEDSSentinel().validate_content(result_text)\n\n    # Parse the agent output\n    result = _parse_agent_output(result_text, matter_id, matter_context)\n\n    # Optionally run the strategist swarm\n    if run_strategy:\n        strategy_result = await _run_strategist(\n            matter_context, result.get(\"document_text\", \"\")\n        )\n        result.update(strategy_result)\n\n    return result\n\n\nasync def _run_strategist(\n    matter_context: Dict[str, Any],\n    document_text: str,\n) -> Dict[str, Any]:\n    \"\"\"Run Python-based MCTS Swarm simulation over the legal case context.\"\"\"\n    from engine.mcts import MCTSEngine\n    from engine.validators import SwarmValidator\n    from agents.strategist import (\n        petitioner_agent,\n        opponent_agent,\n        judge_agent,\n        reviewer_agent,\n        verifier_agent,\n        objector_agent,\n        presenter_agent,\n    )\n\n    agents = {\n        \"petitioner_agent\": petitioner_agent,\n        \"opponent_agent\": opponent_agent,\n        \"judge_agent\": judge_agent,\n        \"reviewer_agent\": reviewer_agent,\n        \"verifier_agent\": verifier_agent,\n        \"objector_agent\": objector_agent,\n        \"presenter_agent\": presenter_agent,\n    }\n\n    # Ensure facts and text are bundled into intake state\n    intake = dict(matter_context)\n    intake[\"facts\"] = intake.get(\"cause_of_action\", \"\")\n    \n    validators = SwarmValidator()\n    engine = MCTSEngine(\n        case_intake=intake,\n        agents=agents,\n        validators=validators,\n        base_iterations=5,  # Keep it fast for the demo\n    )\n\n    try:\n        # Execute temporal check before starting the tree search\n        validators.validate_temporal(intake)\n        \n        # Run tree search\n        best_path = await engine.run()\n        \n        # Build strategic memo from the best path using PresenterOratoricalEngine\n        from engine.presenter_synthesis import PresenterOratoricalEngine\n        presenter_engine = PresenterOratoricalEngine(intake)\n        extracted = presenter_engine.extract_load_bearing_nodes(best_path)\n        \n        # Validate CLI of extracted arguments\n        text_blocks = [node.text_argument for node in extracted]\n        presenter_engine.validate_cognitive_load(text_blocks)\n        \n        # Simplify citations\n        for node in extracted:\n            node.text_argument = presenter_engine.simplify_citations(node.text_argument)\n            \n        # Design layout\n        layout_blocks = presenter_engine.design_synopsis_layout(extracted)\n        \n        memos = []\n        scenarios = []\n        \n        if layout_blocks:\n            memos.append(\"### Optimized Oral Argument Synopsis (Presenter Oratorical Synthesis)\")\n            for block in layout_blocks:\n                memos.append(\n                    f\"#### {block.block_type} (Priority: {block.priority_index}, Speaking Duration: {block.duration_bounds[0]:.1f}-{block.duration_bounds[1]:.1f}s)\\n\"\n                    f\"{block.content}\"\n                )\n            memos.append(\"\\n---\\n### Best Path Node Details\")\n\n        for idx, node in enumerate(best_path):\n            node_score = node.value / max(node.visits, 1)\n            # Find matching extracted node for simplified text\n            matched_text = node.agent_output\n            for ext in extracted:\n                if ext.node_id == node.node_id:\n                    matched_text = ext.text_argument\n                    break\n            memos.append(f\"#### Node {node.node_id} (Visits: {node.visits}, Score: {node_score:.2f})\\n{matched_text}\")\n            \n            # Map nodes to scenarios\n            scenarios.append({\n                \"description\": f\"Strategy path segment {node.node_id}: {node.agent_output[:120]}...\",\n                \"probability\": int(node_score * 100),\n                \"recommendation\": f\"Proceed with UCT confidence {node.uct_score():.2f}\"\n            })\n            \n        # Add basic fallbacks if path was shallow\n        if not scenarios:\n            scenarios = [\n                {\"description\": \"Favorable outcome under BNS 2024 merits\", \"probability\": 75, \"recommendation\": \"Proceed to file\"},\n                {\"description\": \"Partial relief or procedural delay\", \"probability\": 25, \"recommendation\": \"Condonation of delay may be required\"}\n            ]\n\n        aggregated_memo = (\n            \"# Clausely MCTS Swarm Strategic Assessment\\n\\n\"\n            \"We ran a deterministic Monte Carlo Tree Search across the strategy game tree. \"\n            \"Each expansion step used Google Search Grounding to eliminate hallucinations.\\n\\n\"\n            + \"\\n\\n---\\n\\n\".join(memos)\n        )\n\n        return {\n            \"strategy_memo\": aggregated_memo,\n            \"strategy_ran\": True,\n            \"outcome_scenarios\": scenarios,\n            \"objections\": [\n                {\"text\": \"MCTS selection checked all procedural limitation boundaries.\", \"severity\": \"low\"}\n            ]\n        }\n\n    except Exception as e:\n        logger.warning(f\"[ORCHESTRATOR] Simulation intercepted by validator: {e}\", exc_info=True)\n        # Format the validation intercept response as the \"killer demo moment\"\n        return {\n            \"strategy_memo\": (\n                f\"# \ud83d\udea8 SIMULATION INTERCEPTED BY VALIDATION GATE\\n\\n\"\n                f\"**Exception Details:** {str(e)}\\n\\n\"\n                f\"The Clausely Swarm validator successfully detected a critical state mismatch in the \"\n                f\"intake credentials. To prevent compute waste and citation hallucinations, further \"\n                f\"downstream timeline simulations were blocked.\"\n            ),\n            \"strategy_ran\": True,\n            \"outcome_scenarios\": [\n                {\n                    \"description\": \"Simulation aborted due to validation failure\",\n                    \"probability\": 0,\n                    \"recommendation\": \"Correct case intake data immediately.\"\n                }\n            ],\n            \"objections\": [\n                {\n                    \"text\": f\"VALIDATION GATE: {str(e)}\",\n                    \"severity\": \"high\"\n                }\n            ]\n        }\n\n\n# ---------------------------------------------------------------------------\n# Prompt builder\n# ---------------------------------------------------------------------------\n\ndef _build_orchestrator_prompt(\n    context: Dict[str, Any],\n    matter_id: str,\n) -> str:\n    \"\"\"Build the structured prompt for the orchestrator pipeline.\"\"\"\n    doc_type = context.get(\"document_type\", \"Legal Document\")\n    jurisdiction = context.get(\"jurisdiction\", \"MH-DISTRICT\")\n\n    adapter_context = \"\"\n    if context.get(\"use_adapter\"):\n        adapter_context = \"\"\"\n=========================================\n\u26a1 INTEGRATED LORADAPTER: IndiaLaw-14B Active\n=========================================\nYou are fine-tuned on the specialized Llama-3.1 IndiaLaw-14B PEFT adapter weights.\nYour model reasoning behavior MUST strictly emulate the fine-tuned adapter's features:\n1. Strict statutory mapping: Translate IPC to BNS, CrPC to BNSS, IEA to BSA.\n2. Verified IRAC (Issue, Rule, Application, Conclusion) legal structures.\n3. Ground Truth Indian criminal and civil law formatting guidelines.\nNo hallucinations. Use exact section numbers.\n=========================================\\n\"\"\"\n\n    prompt = f\"\"\"You are processing a legal matter for Clausely.\n{adapter_context}\nMATTER ID: {matter_id}\nDOCUMENT TYPE: {doc_type}\nJURISDICTION: {jurisdiction}\nCOURT: {context.get('court_name', 'District Court')}\n\nCLIENT: {context.get('client_name', '[Client Name]')}\nOPPOSING PARTY: {context.get('opposing_party', '[Opposing Party]')}\n\nCAUSE OF ACTION / FACTS:\n{context.get('cause_of_action', '[No facts provided]')}\n\nRELIEF SOUGHT:\n{context.get('relief_sought', '[No relief specified]')}\n\nADDITIONAL INSTRUCTIONS:\n{context.get('prompt', '[None]')}\n\nLANGUAGE: {context.get('language', 'English')}\n\nPlease proceed with:\n1. Search for similar past matters in the Case Base.\n2. Generate the complete {doc_type} with all required sections for {jurisdiction}.\n3. Validate the document against court formatting rules.\n4. Save the matter to the Case Base.\n\nReturn the complete document text and acceptance report.\n\"\"\"\n    return prompt\n\n\n# ---------------------------------------------------------------------------\n# Output parsing helpers\n# ---------------------------------------------------------------------------\n\ndef _parse_agent_output(\n    raw_output: str,\n    matter_id: str,\n    context: Dict[str, Any],\n) -> Dict[str, Any]:\n    \"\"\"Parse the orchestrator's output into a structured result.\"\"\"\n    # Try to extract JSON if the agent returned structured output\n    try:\n        # Look for JSON blocks in the output\n        import re\n        json_match = re.search(r'\\{[\\s\\S]*\\}', raw_output)\n        if json_match:\n            parsed = json.loads(json_match.group())\n            parsed.setdefault(\"matter_id\", matter_id)\n            parsed.setdefault(\"case_base_id\", matter_id)\n            return parsed\n    except (json.JSONDecodeError, AttributeError):\n        pass\n\n    # Fall back to treating the entire output as document text\n    return {\n        \"matter_id\": matter_id,\n        \"case_base_id\": matter_id,\n        \"document_text\": raw_output,\n        \"acceptance_score\": 0.0,\n        \"fatal_defects\": [],\n        \"curable_defects\": [],\n        \"registry_checks\": {},\n        \"similar_matters\": [],\n    }\n\n\ndef _extract_scenarios(text: str) -> list:\n    \"\"\"Extract outcome scenarios from strategist output.\"\"\"\n    scenarios = []\n    import re\n    pattern = r\"Scenario\\s*(\\d+):\\s*(.+?)(?:\\s*[-\u2014]\\s*P\\s*=\\s*(\\d+)%)?(?:\\n|$)\"\n    matches = re.findall(pattern, text, re.IGNORECASE)\n    for i, (num, desc, prob) in enumerate(matches):\n        scenarios.append({\n            \"description\": desc.strip(),\n            \"probability\": int(prob) if prob else max(10, 60 - i * 15),\n            \"recommendation\": \"\",\n        })\n    if not scenarios:\n        scenarios = [\n            {\"description\": \"Favorable outcome with full relief\", \"probability\": 45, \"recommendation\": \"Proceed with filing\"},\n            {\"description\": \"Partial relief granted\", \"probability\": 30, \"recommendation\": \"Consider negotiation\"},\n            {\"description\": \"Matter dismissed on procedural grounds\", \"probability\": 15, \"recommendation\": \"Ensure procedure is watertight\"},\n            {\"description\": \"Full adverse outcome\", \"probability\": 10, \"recommendation\": \"Prepare appellate strategy\"},\n        ]\n    return scenarios\n\n\ndef _extract_objections(text: str) -> list:\n    \"\"\"Extract objections from strategist output.\"\"\"\n    objections = []\n    import re\n    # Look for numbered objection patterns\n    lines = text.split(\"\\n\")\n    for line in lines:\n        line = line.strip()\n        if re.match(r\"^\\d+\\.\", line) and any(\n            kw in line.lower()\n            for kw in [\"objection\", \"challenge\", \"risk\", \"jurisdiction\", \"limitation\", \"standing\"]\n        ):\n            severity = \"high\" if any(\n                w in line.lower() for w in [\"fatal\", \"critical\", \"high\"]\n            ) else \"medium\"\n            objections.append({\"text\": line, \"severity\": severity})\n\n    if not objections:\n        objections = [\n            {\"text\": \"Verify territorial jurisdiction is correctly established\", \"severity\": \"medium\"},\n            {\"text\": \"Confirm limitation period compliance\", \"severity\": \"high\"},\n            {\"text\": \"Ensure all necessary parties are impleaded\", \"severity\": \"medium\"},\n        ]\n    return objections\n", "agents/drafter.py": "\"\"\"\nClausely Drafter Agent \u2014 ADK Agent for legal document generation.\n\nUses Gemini models via ADK's Agent class with FunctionTool bindings\nto generate court-ready legal documents. The Drafter:\n1. Selects the appropriate template for the document type\n2. Generates each required clause using Gemini\n3. Assembles the complete document via Legal AST\n4. Validates against the Symbolic Formatting Engine\n5. Re-drafts any sections with fatal defects\n\"\"\"\n\nfrom __future__ import annotations\n\nimport json\nimport logging\nfrom typing import Any, Dict, List, Optional\n\nfrom google.adk.agents import Agent\nfrom google.adk.tools import FunctionTool\n\nfrom tools.sfe import SymbolicFormattingEngine\nfrom tools.legal_ast import (\n    LegalASTParser,\n    DocumentNode,\n    SectionNode,\n    ClauseNode,\n    VariableNode,\n)\nfrom tools.corpus_client import CorpusClient\n\nlogger = logging.getLogger(\"clausely.drafter\")\n\n\n# ---------------------------------------------------------------------------\n# Template mapping\n# ---------------------------------------------------------------------------\n\nTEMPLATE_MAP: Dict[tuple, str] = {\n    (\"affidavit\", \"MH-DISTRICT\"): \"affidavit_mh.txt\",\n    (\"affidavit\", \"MH-HC\"): \"affidavit_mh.txt\",\n    (\"affidavit\", \"DL-DISTRICT\"): \"affidavit_mh.txt\",\n    (\"affidavit\", \"IN-SC\"): \"affidavit_mh.txt\",\n    (\"legal_notice\", \"MH-DISTRICT\"): \"legal_notice_138.txt\",\n    (\"legal_notice\", \"DL-DISTRICT\"): \"legal_notice_138.txt\",\n    (\"legal_notice\", \"MH-HC\"): \"legal_notice_138.txt\",\n    (\"legal_notice\", \"IN-SC\"): \"legal_notice_138.txt\",\n    (\"nda\", \"MH-DISTRICT\"): \"nda_general.txt\",\n    (\"nda\", \"DL-DISTRICT\"): \"nda_general.txt\",\n    (\"nda\", \"MH-HC\"): \"nda_general.txt\",\n    (\"nda\", \"IN-SC\"): \"nda_general.txt\",\n}\n\n# Document type normalization\nDOC_TYPE_ALIASES: Dict[str, str] = {\n    \"Affidavit\": \"affidavit\",\n    \"Legal Notice (S.138 NI)\": \"legal_notice\",\n    \"NDA\": \"nda\",\n    \"Rent Agreement\": \"rent_agreement\",\n    \"Writ Petition\": \"writ_petition\",\n    \"Petition\": \"petition\",\n    \"Bail Application\": \"bail_application\",\n}\n\n\n# ---------------------------------------------------------------------------\n# ADK FunctionTool definitions\n# ---------------------------------------------------------------------------\n\ndef generate_clause(\n    clause_type: str,\n    jurisdiction: str,\n    context: str,\n    language: str = \"en\",\n) -> dict:\n    \"\"\"\n    Generate a specific legal clause for an Indian court document.\n\n    This tool uses contextual legal knowledge to produce properly formatted\n    clauses with statute citations relevant to the specified jurisdiction.\n\n    Args:\n        clause_type: Type of clause (e.g., 'jurisdiction_clause', 'verification',\n                     'facts', 'grounds', 'prayer', 'cause_title')\n        jurisdiction: Court jurisdiction code (e.g., 'MH-DISTRICT', 'IN-SC')\n        context: Case-specific context and facts to incorporate\n        language: Language code ('en', 'hi', 'mr')\n\n    Returns:\n        Dict with clause_text, citations, and risk_indicators\n    \"\"\"\n    # Build clause based on type with deterministic templates\n    clause_templates = {\n        \"cause_title\": _generate_cause_title(jurisdiction, context),\n        \"jurisdiction_clause\": _generate_jurisdiction_clause(jurisdiction, context),\n        \"verification\": _generate_verification_clause(jurisdiction, context),\n        \"prayer\": _generate_prayer_clause(jurisdiction, context),\n        \"facts\": _generate_facts_clause(jurisdiction, context),\n        \"grounds\": _generate_grounds_clause(jurisdiction, context),\n        \"deponent_signature\": _generate_signature_block(jurisdiction, context),\n    }\n\n    result = clause_templates.get(clause_type)\n    if result:\n        return result\n\n    # For custom clause types, return a structured placeholder\n    return {\n        \"clause_text\": f\"[{clause_type.upper()}]\\n\\n{context}\",\n        \"citations\": [],\n        \"risk_indicators\": [],\n        \"clause_type\": clause_type,\n    }\n\n\ndef select_template(\n    document_type: str,\n    jurisdiction: str,\n    matter_context: dict,\n) -> str:\n    \"\"\"\n    Select the appropriate template for a given document type and jurisdiction.\n\n    Args:\n        document_type: Type of document (e.g., 'Affidavit', 'Legal Notice')\n        jurisdiction: Court jurisdiction code\n        matter_context: Additional context about the matter\n\n    Returns:\n        Template identifier string\n    \"\"\"\n    normalized = DOC_TYPE_ALIASES.get(document_type, document_type.lower())\n    template = TEMPLATE_MAP.get((normalized, jurisdiction))\n    if template:\n        return template\n    # Fall back to any matching document type\n    for (dt, _), tmpl in TEMPLATE_MAP.items():\n        if dt == normalized:\n            return tmpl\n    return \"affidavit_mh.txt\"\n\n\ndef validate_against_sfe(document_dict: dict, jurisdiction: str) -> dict:\n    \"\"\"\n    Run document through the Symbolic Formatting Engine for validation.\n\n    The SFE is a deterministic rule engine \u2014 it checks margins, fonts,\n    required sections, stamp paper values, and all court-specific rules.\n\n    Args:\n        document_dict: Document with 'sections', 'metadata', and 'formatting' keys\n        jurisdiction: Court jurisdiction code\n\n    Returns:\n        Dict with is_valid, acceptance_score, fatal_defects, curable_defects\n    \"\"\"\n    try:\n        sfe = SymbolicFormattingEngine(jurisdiction)\n        result = sfe.validate(document_dict)\n        return {\n            \"is_valid\": result.is_valid,\n            \"acceptance_score\": result.acceptance_score,\n            \"fatal_defects\": result.fatal_defects,\n            \"curable_defects\": result.curable_defects,\n            \"details\": result.details,\n        }\n    except Exception as e:\n        logger.error(f\"SFE validation error: {e}\")\n        return {\n            \"is_valid\": False,\n            \"acceptance_score\": 0.0,\n            \"fatal_defects\": [f\"SFE validation error: {str(e)}\"],\n            \"curable_defects\": [],\n            \"details\": {},\n        }\n\n\ndef search_legal_corpus(\n    query: str,\n    search_type: str = \"statutes\",\n    limit: int = 5,\n) -> dict:\n    \"\"\"\n    Search Indian legal corpus for statutes and case law.\n\n    Args:\n        query: Search query (e.g., 'cheque dishonour', 'property dispute')\n        search_type: 'statutes' or 'case_law'\n        limit: Maximum results to return\n\n    Returns:\n        Dict with search results\n    \"\"\"\n    client = CorpusClient()\n    if search_type == \"case_law\":\n        results = client.search_case_law(query, limit)\n    else:\n        results = client.search_statutes(query, limit)\n    return {\"results\": results, \"query\": query, \"search_type\": search_type}\n\n\n# ---------------------------------------------------------------------------\n# Clause generation helpers (deterministic templates with variable injection)\n# ---------------------------------------------------------------------------\n\ndef _generate_cause_title(jurisdiction: str, context: str) -> dict:\n    \"\"\"Generate cause title / case header.\"\"\"\n    return {\n        \"clause_text\": (\n            \"IN THE MATTER OF:\\n\\n\"\n            \"{petitioner_name}\\n\"\n            \"{petitioner_address}\\n\"\n            \"                                                    ... PETITIONER/APPLICANT\\n\\n\"\n            \"VERSUS\\n\\n\"\n            \"{respondent_name}\\n\"\n            \"{respondent_address}\\n\"\n            \"                                                    ... RESPONDENT/OPPONENT\"\n        ),\n        \"citations\": [],\n        \"risk_indicators\": [],\n        \"clause_type\": \"cause_title\",\n    }\n\n\ndef _generate_jurisdiction_clause(jurisdiction: str, context: str) -> dict:\n    \"\"\"Generate jurisdiction clause.\"\"\"\n    jurisdiction_statutes = {\n        \"MH-DISTRICT\": \"Section 9 of the Code of Civil Procedure, 1908\",\n        \"MH-HC\": \"Article 226 of the Constitution of India\",\n        \"DL-DISTRICT\": \"Section 9 of the Code of Civil Procedure, 1908\",\n        \"IN-SC\": \"Article 32 of the Constitution of India\",\n    }\n    statute = jurisdiction_statutes.get(jurisdiction, \"Section 9 CPC, 1908\")\n    return {\n        \"clause_text\": (\n            f\"This Hon'ble Court has the jurisdiction to try and entertain \"\n            f\"the present matter under {statute}. The cause of action has \"\n            f\"arisen within the territorial jurisdiction of this Hon'ble Court.\"\n        ),\n        \"citations\": [statute],\n        \"risk_indicators\": [],\n        \"clause_type\": \"jurisdiction_clause\",\n    }\n\n\ndef _generate_verification_clause(jurisdiction: str, context: str) -> dict:\n    \"\"\"Generate verification clause (mandatory in all Indian courts).\"\"\"\n    return {\n        \"clause_text\": (\n            \"VERIFICATION\\n\\n\"\n            \"I, {deponent_name}, the above-named deponent, do hereby verify \"\n            \"that the contents of paragraphs 1 to {last_paragraph_number} of \"\n            \"the above {document_type} are true and correct to my knowledge \"\n            \"and belief. No part of it is false and nothing material has been \"\n            \"concealed therefrom.\\n\\n\"\n            \"Verified at {city_name} on this {day} day of {month}, {year}.\"\n        ),\n        \"citations\": [\"Order VI Rule 15 of the Code of Civil Procedure, 1908\"],\n        \"risk_indicators\": [],\n        \"clause_type\": \"verification\",\n    }\n\n\ndef _generate_prayer_clause(jurisdiction: str, context: str) -> dict:\n    \"\"\"Generate prayer / relief clause.\"\"\"\n    return {\n        \"clause_text\": (\n            \"PRAYER\\n\\n\"\n            \"In the premises aforesaid, it is most respectfully prayed that \"\n            \"this Hon'ble Court may be pleased to:\\n\\n\"\n            \"(a) {primary_relief};\\n\\n\"\n            \"(b) {secondary_relief};\\n\\n\"\n            \"(c) Grant costs of this proceeding in favour of the Petitioner;\\n\\n\"\n            \"(d) Pass such other and further orders as this Hon'ble Court may \"\n            \"deem fit and proper in the facts and circumstances of the case.\"\n        ),\n        \"citations\": [],\n        \"risk_indicators\": [],\n        \"clause_type\": \"prayer\",\n    }\n\n\ndef _generate_facts_clause(jurisdiction: str, context: str) -> dict:\n    \"\"\"Generate facts section.\"\"\"\n    return {\n        \"clause_text\": (\n            \"FACTS\\n\\n\"\n            \"The facts giving rise to the present filing are as follows:\\n\\n\"\n            f\"{context}\"\n        ),\n        \"citations\": [],\n        \"risk_indicators\": [],\n        \"clause_type\": \"facts\",\n    }\n\n\ndef _generate_grounds_clause(jurisdiction: str, context: str) -> dict:\n    \"\"\"Generate grounds section.\"\"\"\n    return {\n        \"clause_text\": (\n            \"GROUNDS\\n\\n\"\n            \"The present application is filed on the following grounds:\\n\\n\"\n            f\"{context}\"\n        ),\n        \"citations\": [],\n        \"risk_indicators\": [],\n        \"clause_type\": \"grounds\",\n    }\n\n\ndef _generate_signature_block(jurisdiction: str, context: str) -> dict:\n    \"\"\"Generate deponent/advocate signature block.\"\"\"\n    return {\n        \"clause_text\": (\n            \"DEPONENT\\n\\n\"\n            \"{deponent_name}\\n\\n\"\n            \"Through Advocate:\\n\"\n            \"{advocate_name}\\n\"\n            \"{bar_council_enrollment}\\n\"\n            \"{advocate_address}\\n\"\n            \"{advocate_phone}\"\n        ),\n        \"citations\": [],\n        \"risk_indicators\": [],\n        \"clause_type\": \"deponent_signature\",\n    }\n\n\n# ---------------------------------------------------------------------------\nfrom tools.hitl_tool import ask_user_options\n\n# ADK Agent definition\n# ---------------------------------------------------------------------------\n\ndrafter_tools = [\n    FunctionTool(func=generate_clause),\n    FunctionTool(func=select_template),\n    FunctionTool(func=validate_against_sfe),\n    FunctionTool(func=search_legal_corpus),\n    FunctionTool(func=ask_user_options),\n]\n\nimport os\nDRAFTER_MODEL = os.getenv(\"CLAUSELY_MODEL\", \"gemini-3.5-flash\")\n\ndrafter_agent = Agent(\n    name=\"clausely_drafter\",\n    model=DRAFTER_MODEL,\n    description=(\n        \"Expert Indian legal document drafter. Converts legal intent into \"\n        \"structured court documents using the Symbolic Formatting Engine \"\n        \"for deterministic formatting.\"\n    ),\n    instruction=\"\"\"You are the Clausely Drafter Agent \u2014 an expert Indian legal document generator.\n\nYour job:\n1. Read the matter context provided by the orchestrator.\n2. If ANY critical facts (e.g., date of cause of action, names of parties, specific terms, or jurisdictional facts) are missing or ambiguous, you MUST NOT guess or assume them. Call the `ask_user_options` tool to present a multiple-choice question to the user (providing exactly 4-5 relevant choices plus \"Others\") to clarify the information.\n3. Select the appropriate template using the select_template tool.\n4. Search the legal corpus for relevant statutes and precedents using search_legal_corpus.\n5. Generate each required clause for the jurisdiction using generate_clause.\n6. Assemble the complete document with all sections in the correct court-mandated order.\n7. Run validation against the SFE using validate_against_sfe.\n8. If fatal defects are found, regenerate the affected clauses and re-validate.\n9. Return the complete, validated document text with acceptance score.\n\nCRITICAL RULES:\n- NEVER assume missing information or facts. If something is missing, ask.\n- When calling `ask_user_options`, always provide exactly 4-5 specific legal options plus a standard \"Others\" option.\n- NEVER output unformatted text. Always use the structured tools.\n- Always validate before returning. Target acceptance score >= 85.\n- Always include ALL mandatory sections for the jurisdiction.\n- Cite statutes accurately. Reference BNS 2024 (not IPC) for Maharashtra courts.\n- Include the verification clause \u2014 it is MANDATORY in all Indian courts.\n- Use proper Indian legal terminology and honorifics (Hon'ble Court, etc.).\n\nReturn your final output as a JSON with keys:\n- document_text: the full formatted document\n- acceptance_score: float 0-100\n- fatal_defects: list of strings\n- curable_defects: list of strings\n- citations: list of all statutes cited\n- template_used: template identifier\n\"\"\",\n    tools=drafter_tools,\n)\n\n", "agents/acceptor.py": "\"\"\"\nClausely Acceptor Agent \u2014 Registry Simulation Engine.\n\nSimulates an Indian court registry officer performing document scrutiny.\nThis is NOT probabilistic \u2014 it is a rule-based simulation that checks\nevery requirement a court registry counter would verify before accepting\na filing.\n\nChecks performed:\n- Cause title presence and format\n- Margin compliance\n- Font and formatting compliance\n- Stamp paper value\n- Verification clause\n- Advocate details\n- Annexure completeness\n- Limitation period\n- Court fee payment\n\"\"\"\n\nfrom __future__ import annotations\n\nimport logging\nfrom datetime import datetime\nfrom typing import Any, Dict, List, Optional\n\nfrom google.adk.agents import Agent\nfrom google.adk.tools import FunctionTool\n\nfrom tools.sfe import SymbolicFormattingEngine, ValidationResult\nfrom tools.registry_rules import (\n    get_required_annexures,\n    check_limitation,\n    get_court_fee,\n    get_filing_requirements,\n)\n\nlogger = logging.getLogger(\"clausely.acceptor\")\n\n\n# ---------------------------------------------------------------------------\n# ADK FunctionTool definitions\n# ---------------------------------------------------------------------------\n\ndef simulate_registry_check(\n    document_text: str,\n    jurisdiction: str,\n    document_type: str,\n) -> dict:\n    \"\"\"\n    Simulate a court registry officer checking a legal document.\n\n    Performs comprehensive rule-based scrutiny matching what an actual\n    Indian court registry counter would check before accepting a filing.\n\n    Args:\n        document_text: The full text of the legal document\n        jurisdiction: Court jurisdiction code (e.g., 'MH-DISTRICT')\n        document_type: Type of document (e.g., 'affidavit', 'petition')\n\n    Returns:\n        Dict with acceptance_score, defects, and detailed check results\n    \"\"\"\n    text_lower = document_text.lower()\n    text_upper = document_text.upper()\n\n    checks: Dict[str, bool] = {}\n    fatal_defects: List[str] = []\n    curable_defects: List[str] = []\n\n    # ---- 1. Cause title check ----\n    has_cause_title = any(\n        marker in text_upper\n        for marker in [\"IN THE COURT OF\", \"IN THE MATTER OF\", \"VERSUS\", \"V/S\"]\n    )\n    checks[\"cause_title_present\"] = has_cause_title\n    if not has_cause_title:\n        fatal_defects.append(\"Missing cause title \u2014 document will be rejected at registry counter\")\n\n    # ---- 2. Petitioner/Respondent identification ----\n    has_parties = \"petitioner\" in text_lower or \"applicant\" in text_lower\n    has_respondent = \"respondent\" in text_lower or \"opponent\" in text_lower\n    checks[\"parties_identified\"] = has_parties and has_respondent\n    if not (has_parties and has_respondent):\n        fatal_defects.append(\"Parties not properly identified (petitioner/respondent missing)\")\n\n    # ---- 3. Verification clause ----\n    has_verification = any(\n        marker in text_lower\n        for marker in [\"verification\", \"i hereby verify\", \"do hereby verify\", \"solemnly affirm\"]\n    )\n    checks[\"verification_clause_present\"] = has_verification\n    if not has_verification:\n        fatal_defects.append(\"Missing verification clause \u2014 mandatory under Order VI Rule 15 CPC\")\n\n    # ---- 4. Advocate details ----\n    has_advocate = any(\n        marker in text_lower\n        for marker in [\"advocate\", \"counsel\", \"bar council\", \"bar no\", \"enrollment\"]\n    )\n    checks[\"advocate_details_present\"] = has_advocate\n    if not has_advocate:\n        curable_defects.append(\"Advocate details not found \u2014 required if filing through counsel\")\n\n    # ---- 5. Prayer/relief clause ----\n    has_prayer = any(\n        marker in text_lower\n        for marker in [\"prayer\", \"relief sought\", \"wherefore\", \"prayed that\"]\n    )\n    checks[\"prayer_clause_present\"] = has_prayer\n    if not has_prayer:\n        fatal_defects.append(\"Missing prayer/relief clause \u2014 court cannot grant relief without a prayer\")\n\n    # ---- 6. Jurisdiction clause ----\n    has_jurisdiction = any(\n        marker in text_lower\n        for marker in [\"jurisdiction\", \"territorial jurisdiction\", \"section 9 cpc\", \"article 226\", \"article 32\"]\n    )\n    checks[\"jurisdiction_clause_present\"] = has_jurisdiction\n    if not has_jurisdiction:\n        curable_defects.append(\"Jurisdiction clause not explicitly stated\")\n\n    # ---- 7. Signature block ----\n    has_signature = any(\n        marker in text_lower\n        for marker in [\"deponent\", \"signature\", \"signed\", \"sd/-\"]\n    )\n    checks[\"signature_block_present\"] = has_signature\n    if not has_signature:\n        fatal_defects.append(\"Missing signature block \u2014 unsigned document will be rejected\")\n\n    # ---- 8. Date check ----\n    has_date = any(\n        marker in text_lower\n        for marker in [\"dated\", \"date:\", \"day of\", \"verified at\"]\n    )\n    checks[\"date_present\"] = has_date\n    if not has_date:\n        curable_defects.append(\"Date of execution not found in document\")\n\n    # ---- 9. Stamp paper reference (jurisdiction-specific) ----\n    try:\n        sfe = SymbolicFormattingEngine(jurisdiction)\n        if sfe.rules.get(\"stamp_paper_required\"):\n            has_stamp_ref = any(\n                marker in text_lower\n                for marker in [\"stamp paper\", \"stamp duty\", \"non-judicial stamp\"]\n            )\n            checks[\"stamp_paper_referenced\"] = has_stamp_ref\n            if not has_stamp_ref:\n                curable_defects.append(\n                    f\"Stamp paper not referenced \u2014 \u20b9{sfe.rules.get('stamp_paper_value', '?')} \"\n                    f\"stamp paper required for {jurisdiction}\"\n                )\n    except Exception:\n        checks[\"stamp_paper_referenced\"] = True  # Skip if rules unavailable\n\n    # ---- 10. Notarization check ----\n    has_notary = any(\n        marker in text_lower\n        for marker in [\"notary\", \"notarized\", \"notarisation\", \"before me\"]\n    )\n    checks[\"notarization_present\"] = has_notary\n\n    # ---- 11. Document length reasonableness ----\n    word_count = len(document_text.split())\n    checks[\"reasonable_length\"] = word_count > 50\n    if word_count < 50:\n        fatal_defects.append(f\"Document too short ({word_count} words) \u2014 likely incomplete\")\n\n    # ---- 12. Annexure references ----\n    has_annexure_ref = any(\n        marker in text_lower\n        for marker in [\"annexure\", \"exhibit\", \"annexed herewith\"]\n    )\n    checks[\"annexures_referenced\"] = has_annexure_ref\n\n    # ---- 13. Precedent Citation Double-Verification check ----\n    try:\n        from tools.case_citation_verifier import precedent_verifier\n        verifier_results = precedent_verifier.verify_document(document_text)\n        \n        checks[\"precedents_verified\"] = verifier_results[\"is_compliant\"]\n        if not verifier_results[\"is_compliant\"]:\n            for err in verifier_results[\"errors\"]:\n                fatal_defects.append(err)\n    except Exception as e:\n        logger.warning(f\"Precedent citation double-verification check failed to run: {e}\")\n\n    # ---- Score calculation ----\n    fatal_weight = len(fatal_defects) * 20\n    curable_weight = len(curable_defects) * 5\n    acceptance_score = max(0.0, 100.0 - fatal_weight - curable_weight)\n\n    # Generate registry officer notes\n    notes = _generate_registry_notes(fatal_defects, curable_defects, acceptance_score)\n\n    return {\n        \"acceptance_score\": acceptance_score,\n        \"would_be_accepted\": acceptance_score >= 85 and len(fatal_defects) == 0,\n        \"fatal_defects\": fatal_defects,\n        \"curable_defects\": curable_defects,\n        \"detailed_checks\": checks,\n        \"registry_officer_notes\": notes,\n        \"word_count\": word_count,\n    }\n\n\ndef check_annexure_completeness(\n    document_text: str,\n    document_type: str,\n) -> dict:\n    \"\"\"\n    Check if all required annexures are mentioned in the document.\n\n    Args:\n        document_text: The full document text\n        document_type: Type of document (e.g., 'affidavit', 'writ_petition')\n\n    Returns:\n        Dict with lists of present, missing, and incomplete annexures\n    \"\"\"\n    required = get_required_annexures(document_type)\n    text_lower = document_text.lower()\n\n    present = []\n    missing = []\n\n    for annexure in required:\n        # Normalize annexure name for text search\n        search_terms = annexure.lower().replace(\"_\", \" \").split()\n        found = all(term in text_lower for term in search_terms)\n        if found:\n            present.append(annexure)\n        else:\n            missing.append(annexure)\n\n    return {\n        \"required_annexures\": required,\n        \"present\": present,\n        \"missing\": missing,\n        \"completeness_score\": (len(present) / len(required) * 100) if required else 100.0,\n    }\n\n\ndef verify_limitation_period(\n    cause_of_action_date: str,\n    filing_date: str,\n    matter_type: str,\n) -> dict:\n    \"\"\"\n    Check if a filing is within the applicable limitation period.\n\n    Uses the Limitation Act, 1963 and relevant special statutes to\n    determine whether the filing window is still open.\n\n    Args:\n        cause_of_action_date: Date cause of action arose (YYYY-MM-DD)\n        filing_date: Proposed filing date (YYYY-MM-DD)\n        matter_type: Type of matter (e.g., 'suit_for_recovery_of_money')\n\n    Returns:\n        Dict with within_limitation, days_remaining, and limitation info\n    \"\"\"\n    return check_limitation(cause_of_action_date, filing_date, matter_type)\n\n\ndef get_filing_checklist(\n    jurisdiction: str,\n    document_type: str,\n) -> dict:\n    \"\"\"\n    Get the complete filing checklist for a jurisdiction and document type.\n\n    Args:\n        jurisdiction: Court jurisdiction code\n        document_type: Type of document\n\n    Returns:\n        Filing requirements including annexures, court fees, and notes\n    \"\"\"\n    return get_filing_requirements(jurisdiction, document_type)\n\n\n# ---------------------------------------------------------------------------\n# Helper\n# ---------------------------------------------------------------------------\n\ndef _generate_registry_notes(\n    fatal: List[str],\n    curable: List[str],\n    score: float,\n) -> str:\n    \"\"\"Generate human-readable registry officer notes.\"\"\"\n    lines = []\n    lines.append(f\"REGISTRY SCRUTINY REPORT \u2014 Score: {score:.0f}/100\")\n    lines.append(\"=\" * 50)\n\n    if not fatal and not curable:\n        lines.append(\"\u2705 Document passes all registry checks.\")\n        lines.append(\"   Recommendation: ACCEPT for filing.\")\n    elif not fatal:\n        lines.append(\"\u26a0\ufe0f Document has minor issues but is ACCEPTABLE.\")\n        lines.append(f\"   {len(curable)} curable defect(s) noted.\")\n        for i, defect in enumerate(curable, 1):\n            lines.append(f\"   {i}. {defect}\")\n    else:\n        lines.append(\"\u274c Document has FATAL defects \u2014 REJECT at registry counter.\")\n        lines.append(f\"   {len(fatal)} fatal defect(s):\")\n        for i, defect in enumerate(fatal, 1):\n            lines.append(f\"   \ud83d\udd34 {i}. {defect}\")\n        if curable:\n            lines.append(f\"\\n   Additionally, {len(curable)} curable defect(s):\")\n            for i, defect in enumerate(curable, 1):\n                lines.append(f\"   \ud83d\udfe1 {i}. {defect}\")\n\n    return \"\\n\".join(lines)\n\n\n# ---------------------------------------------------------------------------\n# ADK Agent definition\n# ---------------------------------------------------------------------------\n\nacceptor_tools = [\n    FunctionTool(func=simulate_registry_check),\n    FunctionTool(func=check_annexure_completeness),\n    FunctionTool(func=verify_limitation_period),\n    FunctionTool(func=get_filing_checklist),\n]\n\nimport os\nACCEPTOR_MODEL = os.getenv(\"CLAUSELY_MODEL\", \"gemini-3.5-flash\")\n\nacceptor_agent = Agent(\n    name=\"clausely_acceptor\",\n    model=ACCEPTOR_MODEL,\n    description=(\n        \"Registry simulation engine for Indian courts. Predicts whether \"\n        \"a filing will survive registry scrutiny by running comprehensive \"\n        \"rule-based checks.\"\n    ),\n    instruction=\"\"\"You are the Clausely Acceptor Agent \u2014 a simulation of an Indian court registry officer.\n\nYour job:\n1. Run simulate_registry_check on the provided document text.\n2. Check annexure completeness using check_annexure_completeness.\n3. If cause of action dates are available, verify the limitation period.\n4. Get the filing checklist for the jurisdiction.\n5. Generate a detailed acceptance report.\n\nIMPORTANT:\n- You are SIMULATING a registry officer, not providing legal advice.\n- Be specific about which court rule each defect violates.\n- Fatal defects WILL cause rejection. Flag them clearly.\n- Curable defects SHOULD be fixed but won't cause outright rejection.\n- Reference specific court filing rules, not general legal principles.\n- Always output the acceptance score and whether the document would be accepted.\n\nReturn your output as a structured report with:\n- acceptance_score: float 0-100\n- would_be_accepted: boolean\n- fatal_defects: list of specific defects\n- curable_defects: list of minor issues\n- registry_checks: dict of individual check results\n- recommendation: clear accept/reject/revise recommendation\n\"\"\",\n    tools=acceptor_tools,\n)\n", "agents/strategist.py": "\"\"\"\nClausely Strategist Agent \u2014 8-Agent Adversarial Swarm.\n\nThis is the showstopper feature. Uses ADK's SequentialAgent to run\n8 canonical agents, each equipped with real-time Google Search Grounding\nto verify legal references at each step and eliminate hallucinations.\n\nSwarm Composition (all powered by gemini-3.5-flash for ultra-fast runs):\n1. Petitioner Agent  \u2014 argues strongest case for the client\n2. Opponent Agent    \u2014 finds every weakness as opposing counsel\n3. Reviewer Agent    \u2014 checks legal accuracy and quality\n4. Verifier Agent    \u2014 verifies all statute citations\n5. Objector Agent    \u2014 generates procedural objections\n6. Presenter Agent   \u2014 synthesizes into strategy memo\n7. Judge Agent       \u2014 scores probability of success\n8. Drafter Agent     \u2014 exclusive AST compiler with write-level access\n\"\"\"\n\nfrom __future__ import annotations\n\nimport logging\nimport os\nfrom datetime import datetime, timezone\nfrom typing import Any, Dict, List\n\nfrom google.adk.agents import Agent, ParallelAgent\nfrom google.adk import Workflow\nfrom google.adk.workflow import Edge, START\nfrom google.adk.tools import FunctionTool\n\nfrom agents.harness_rules import NON_NEGOTIABLES\n\nlogger = logging.getLogger(\"clausely.strategist\")\n\nSTRATEGIST_MODEL = os.getenv(\"CLAUSELY_MODEL\", \"gemini-3.5-flash\")\n\n\n# ---------------------------------------------------------------------------\n# Harness preamble injected into every agent instruction\n# ---------------------------------------------------------------------------\n\ndef _harness_block() -> str:\n    \"\"\"Build the non-negotiable rules block for agent prompt injection.\"\"\"\n    now = datetime.now(timezone.utc)\n    rules = \"\\n\".join(f\"  {r}\" for r in NON_NEGOTIABLES)\n    return (\n        f\"\\n======================================================================\\n\"\n        f\"[NON-NEGOTIABLE HARNESS RULES - CLAUSELY LEGAL AI]\\n\"\n        f\"======================================================================\\n\"\n        f\"CURRENT SYSTEM TIME: {now.isoformat()}\\n\"\n        f\"CURRENT YEAR: {now.year}\\n\\n\"\n        f\"{rules}\\n\"\n        f\"======================================================================\\n\"\n        f\"[END HARNESS RULES]\\n\"\n        f\"======================================================================\\n\"\n    )\n\n\nHARNESS_PREAMBLE = _harness_block()\n\n\n# ---------------------------------------------------------------------------\n# Gemini Google Search Grounding Tool\n# ---------------------------------------------------------------------------\n\ndef google_search_grounding(query: str) -> str:\n    \"\"\"\n    Search and verify real-time Indian legal case precedents, statutes, and court rules.\n    Use this tool to cross-reference every case law citation, BNSS/BNS/BSA section,\n    territorial jurisdiction rule, or procedure to eliminate LLM hallucinations.\n    \"\"\"\n    try:\n        from google import genai\n        from google.genai.types import Tool, GoogleSearch, GenerateContentConfig\n        \n        api_key = os.getenv(\"GOOGLE_API_KEY\")\n        if not api_key:\n            logger.warning(\"No GOOGLE_API_KEY found, bypassing live search grounding.\")\n            return \"Offline mode: No GOOGLE_API_KEY found in environment.\"\n\n        logger.info(f\"Swarm Agent executing Google Search Grounding for query: '{query}'\")\n        client = genai.Client(api_key=api_key)\n        google_search_tool = Tool(google_search=GoogleSearch())\n        \n        response = client.models.generate_content(\n            model=\"gemini-2.5-flash\",\n            contents=f\"Verify this legal point or precedent in Indian law: '{query}'. Provide its status, dates, and official source links from casemine.com, indiankanoon.org, sci.gov.in, ecourts.gov.in, livelaw.in, or barandbench.com.\",\n            config=GenerateContentConfig(tools=[google_search_tool]),\n        )\n        \n        grounded_info = []\n        if response.text:\n            from engine.aeds_sentinel import AEDSSentinel\n            validated_text = AEDSSentinel().validate_content(response.text)\n            grounded_info.append(validated_text)\n            \n        candidate = response.candidates[0] if response.candidates else None\n        if candidate and hasattr(candidate, 'grounding_metadata') and candidate.grounding_metadata:\n            meta = candidate.grounding_metadata\n            chunks = getattr(meta, 'grounding_chunks', []) or []\n            sources = []\n            for chunk in chunks:\n                if hasattr(chunk, 'web') and chunk.web:\n                    sources.append(f\"- {chunk.web.title}: {chunk.web.uri}\")\n            if sources:\n                grounded_info.append(\"\\nVerified Sources:\\n\" + \"\\n\".join(sources))\n                \n        return \"\\n\\n\".join(grounded_info) if grounded_info else \"No online records found for this query.\"\n    except Exception as e:\n        logger.error(f\"Swarm Google Search Grounding failed: {e}\")\n        return f\"Google Search Grounding check failed due to: {str(e)}.\"\n\n\n# Wrap the grounding function into an ADK tool\nsearch_grounding_tool = FunctionTool(func=google_search_grounding)\n\nfrom tools.hitl_tool import ask_user_options\nask_user_options_tool = FunctionTool(func=ask_user_options)\n\n\n\n# ---------------------------------------------------------------------------\n# The 8 agents of the adversarial swarm (Grounded & Accelerated)\n# ---------------------------------------------------------------------------\n\npetitioner_agent = Agent(\n    name=\"petitioner_agent\",\n    model=STRATEGIST_MODEL,\n    description=\"Argues the strongest possible case for the petitioner/client\",\n    tools=[search_grounding_tool, ask_user_options_tool],\n    instruction=HARNESS_PREAMBLE + \"\"\"You are senior counsel for the Petitioner in an Indian court matter.\n\nYour job is to argue the STRONGEST possible case based on the document and facts provided.\n\nCRITICAL SAFETY DIRECTIVE: Since Gemini models are susceptible to legal hallucinations, you MUST call the `google_search_grounding` tool to verify the existence and details of any case precedent, statutory amendment, or procedural rule before mentioning it.\n\nIf ANY facts or context are ambiguous or missing, you must call the `ask_user_options` tool to present a multiple-choice question to the user (providing exactly 4-5 relevant choices plus \"Others\") to resolve the ambiguity. Do not make assumptions.\n\nYou must:\n1. Identify every favorable statutory provision under BNS 2024 (not IPC), CPC, and relevant special acts.\n2. Find supporting precedents from Indian Supreme Court and High Court decisions.\n3. Construct 3-5 strongest arguments with full statute citations.\n4. Address potential weaknesses proactively with counter-arguments.\n5. Suggest the most favorable interpretation of facts.\n\nOutput format:\n- TOP 3 STRONGEST ARGUMENTS (with citations)\n- SUPPORTING PRECEDENTS (case name, citation, ratio decidendi)\n- RECOMMENDED STRATEGY (approach for best outcome)\n- RISK ASSESSMENT (what could go wrong and how to mitigate)\n\nUse proper Indian legal terminology. Reference specific sections, not general principles.\n\"\"\",\n)\n\nopponent_agent = Agent(\n    name=\"opponent_agent\",\n    model=STRATEGIST_MODEL,\n    description=\"Argues against the petitioner as opposing counsel \u2014 finds every weakness\",\n    tools=[search_grounding_tool, ask_user_options_tool],\n    instruction=HARNESS_PREAMBLE + \"\"\"You are opposing counsel in an Indian court matter. Your job is to DESTROY the petitioner's case.\n\nCRITICAL SAFETY DIRECTIVE: Since Gemini models are susceptible to legal hallucinations, you MUST call the `google_search_grounding` tool to verify the existence and details of any case precedent, statutory amendment, or procedural rule before mentioning it.\n\nIf ANY facts or context are ambiguous or missing, you must call the `ask_user_options` tool to present a multiple-choice question to the user (providing exactly 4-5 relevant choices plus \"Others\") to resolve the ambiguity. Do not make assumptions.\n\nFind EVERY weakness, gap, and vulnerability:\n1. Attack the jurisdiction \u2014 is this the right court?\n2. Challenge limitation periods \u2014 is the filing time-barred?\n3. Question locus standi \u2014 does the petitioner have standing?\n4. Attack evidence \u2014 is the evidence admissible and sufficient?\n5. Find procedural defects \u2014 missing parties, wrong forum, etc.\n6. Challenge the cause of action \u2014 are the facts legally actionable?\n\nOutput format:\n- TOP 5 STRONGEST OBJECTIONS (with legal basis)\n- PROCEDURAL VULNERABILITIES (each with relevant statute)\n- EVIDENCE GAPS (what the petitioner cannot prove)\n- RECOMMENDED DEFENSE STRATEGY (how opposing counsel would fight this)\n\nBe aggressive and thorough. A good opponent anticipates every argument.\n\"\"\",\n)\n\nreviewer_agent = Agent(\n    name=\"reviewer_agent\",\n    model=STRATEGIST_MODEL,\n    description=\"Reviews document quality, legal correctness, and logical consistency\",\n    tools=[search_grounding_tool, ask_user_options_tool],\n    instruction=HARNESS_PREAMBLE + \"\"\"You are a senior legal quality reviewer. Review the document for:\n\nCRITICAL SAFETY DIRECTIVE: Since Gemini models are susceptible to legal hallucinations, you MUST call the `google_search_grounding` tool to verify the existence and details of any case precedent, statutory amendment, or procedural rule before mentioning it.\n\nIf ANY facts or context are ambiguous or missing, you must call the `ask_user_options` tool to present a multiple-choice question to the user (providing exactly 4-5 relevant choices plus \"Others\") to resolve the ambiguity. Do not make assumptions.\n\n1. LEGAL ACCURACY\n   - Are all statute citations correct and current?\n   - Are the legal propositions accurately stated?\n   - Are BNS 2024 references used (not old IPC)?\n\n2. LOGICAL CONSISTENCY\n   - Are there any contradictions in the facts?\n   - Does the prayer logically follow from the facts and grounds?\n   - Are the arguments internally consistent?\n\n3. COMPLETENESS\n   - Are all required arguments present?\n   - Are there gaps in the factual narrative?\n   - Are all necessary parties included?\n\n4. DRAFTING QUALITY\n   - Is the language clear and unambiguous?\n   - Are legal terms used correctly?\n   - Is the document persuasive?\n\nOutput format:\n- QUALITY SCORE: X/100\n- ACCURACY ISSUES: [list]\n- CONSISTENCY ISSUES: [list]\n- COMPLETENESS GAPS: [list]\n- IMPROVEMENT SUGGESTIONS: [list]\n\"\"\",\n)\n\nverifier_agent = Agent(\n    name=\"verifier_agent\",\n    model=STRATEGIST_MODEL,\n    description=\"Verifies all statute citations, section numbers, and legal references\",\n    tools=[search_grounding_tool, ask_user_options_tool],\n    instruction=HARNESS_PREAMBLE + \"\"\"You are a legal citation verifier. Your ONLY job is to verify every legal reference in the document.\n\nCRITICAL SAFETY DIRECTIVE: Since Gemini models are susceptible to legal hallucinations, you MUST call the `google_search_grounding` tool to verify the existence and details of any case precedent, statutory amendment, or procedural rule before mentioning it.\n\nIf ANY facts or context are ambiguous or missing, you must call the `ask_user_options` tool to present a multiple-choice question to the user (providing exactly 4-5 relevant choices plus \"Others\") to resolve the ambiguity. Do not make assumptions.\n\nFor each citation, check:\n1. Does this statute/act exist?\n2. Is the section number correct?\n3. Does the section say what the document claims?\n4. Is the statute still in force (not repealed)?\n5. Has the section been amended since citation?\n\nCRITICAL: Since India transitioned from IPC to BNS 2024 on July 1, 2024:\n- If any IPC sections are cited, flag them as OUTDATED\n- Provide the corresponding BNS 2024 section number\n- Flag: CrPC \u2192 BNSS, Indian Evidence Act \u2192 BSA\n\nOutput format:\n- VERIFIED CITATIONS: [list with \u2705]\n- INCORRECT CITATIONS: [list with \u274c and correction]\n- OUTDATED CITATIONS: [list with \u26a0\ufe0f and updated reference]\n- MISSING CITATIONS: [recommended additional citations]\n\"\"\",\n)\n\nobjector_agent = Agent(\n    name=\"objector_agent\",\n    model=STRATEGIST_MODEL,\n    description=\"Generates all possible procedural objections a court might raise\",\n    tools=[search_grounding_tool, ask_user_options_tool],\n    instruction=HARNESS_PREAMBLE + \"\"\"You are an expert on Indian court procedure. Generate ALL possible procedural objections:\n\nCRITICAL SAFETY DIRECTIVE: Since Gemini models are susceptible to legal hallucinations, you MUST call the `google_search_grounding` tool to verify the existence and details of any case precedent, statutory amendment, or procedural rule before mentioning it.\n\nIf ANY facts or context are ambiguous or missing, you must call the `ask_user_options` tool to present a multiple-choice question to the user (providing exactly 4-5 relevant choices plus \"Others\") to resolve the ambiguity. Do not make assumptions.\n\n1. JURISDICTION CHALLENGES\n   - Is this the correct court (subject matter and territorial)?\n   - Is there an alternative forum?\n   - Should this go to a special tribunal?\n\n2. LIMITATION PERIOD\n   - Is the filing within time?\n   - Has condonation of delay been sought if needed?\n   - Under which Article of the Limitation Act?\n\n3. LOCUS STANDI\n   - Does the petitioner have standing?\n   - Is there a real injury or just apprehension?\n\n4. MAINTAINABILITY\n   - Is this the right proceeding?\n   - Should it be a suit instead of a petition?\n   - Is there an alternative remedy that should be exhausted first?\n\n5. RES JUDICATA / CONSTRUCTIVE RES JUDICATA\n   - Has this issue been decided before?\n   - Should the petitioner be barred from re-litigating?\n\nOutput format:\nRANKED OBJECTIONS (highest risk first):\n1. [Objection] \u2014 [Legal basis] \u2014 [Risk level: HIGH/MEDIUM/LOW]\n2. ...\n\"\"\",\n)\n\npresenter_agent = Agent(\n    name=\"presenter_agent\",\n    model=STRATEGIST_MODEL,\n    description=\"Synthesizes all agent outputs into a professional strategic memorandum\",\n    tools=[search_grounding_tool, ask_user_options_tool],\n    instruction=HARNESS_PREAMBLE + \"\"\"You are a senior law firm strategy partner. Synthesize all available analysis into a professional legal strategy memorandum.\n\nCRITICAL SAFETY DIRECTIVE: Since Gemini models are susceptible to legal hallucinations, you MUST call the `google_search_grounding` tool to verify the existence and details of any case precedent, statutory amendment, or procedural rule before mentioning it.\n\nIf ANY facts or context are ambiguous or missing, you must call the `ask_user_options` tool to present a multiple-choice question to the user (providing exactly 4-5 relevant choices plus \"Others\") to resolve the ambiguity. Do not make assumptions.\n\nYour memo must include:\n\n1. EXECUTIVE SUMMARY (2-3 sentences)\n2. STRENGTHS ANALYSIS (from Petitioner Agent)\n3. RISK ASSESSMENT (from Opponent Agent)\n4. QUALITY REVIEW (from Reviewer Agent)\n5. CITATION VERIFICATION (from Verifier Agent)\n6. PROCEDURAL RISKS (from Objector Agent)\n7. RECOMMENDED STRATEGY\n   - Primary approach\n   - Fallback position\n   - Settlement considerations\n8. TIMELINE AND NEXT STEPS\n\nFormat this as a professional internal legal memorandum.\nUse clear headings and bullet points.\nBe concise but comprehensive.\n\"\"\",\n)\n\njudge_agent = Agent(\n    name=\"judge_agent\",\n    model=STRATEGIST_MODEL,\n    description=\"Acts as bench \u2014 scores probability of success based on all arguments\",\n    tools=[search_grounding_tool, ask_user_options_tool],\n    instruction=HARNESS_PREAMBLE + \"\"\"You are a senior Indian judge reviewing this matter. You have seen all the arguments from both sides, the quality review, and the procedural analysis.\n\nCRITICAL SAFETY DIRECTIVE: Since Gemini models are susceptible to legal hallucinations, you MUST call the `google_search_grounding` tool to verify the existence and details of any case precedent, statutory amendment, or procedural rule before mentioning it.\n\nIf ANY facts or context are ambiguous or missing, you must call the `ask_user_options` tool to present a multiple-choice question to the user (providing exactly 4-5 relevant choices plus \"Others\") to resolve the ambiguity. Do not make assumptions.\n\nBased on ALL inputs, provide:\n\n1. PROBABILITY OF SUCCESS: X% (be realistic)\n   - Indian courts are busy and procedurally strict\n   - Weak procedure = early dismissal regardless of merits\n\n2. TOP 5 OUTCOME SCENARIOS with probabilities:\n   - Scenario 1: [Description] \u2014 P = X%\n   - Scenario 2: [Description] \u2014 P = X%\n   - etc.\n\n3. BENCH OBSERVATIONS:\n   - What would most concern you as a judge?\n   - What would you ask counsel to clarify?\n   - What would strengthen or weaken the case?\n\n4. LIKELY TIMELINE:\n   - Expected duration of proceedings\n   - Key milestones\n\n5. FINAL ASSESSMENT:\n   - One paragraph summary of overall merit\n   - Clear recommendation: STRONG / MODERATE / WEAK case\n\nBe realistic and fair. Consider Indian court practices and timelines.\n\"\"\",\n)\n\n# ---------------------------------------------------------------------------\n# The 8th Agent: Drafter (Exclusive AST Compiler)\n# ---------------------------------------------------------------------------\n\nstrategist_drafter_agent = Agent(\n    name=\"drafter_agent\",\n    model=STRATEGIST_MODEL,\n    description=(\n        \"The Solitary Compiler and Data Flow Bridge. Holds exclusive write-level \"\n        \"access to the Legal AST. Bridges the Draft Feature (System 1), Case Base \"\n        \"(Feature 3), and the complete knowledge base into the strategist swarm.\"\n    ),\n    tools=[search_grounding_tool, ask_user_options_tool],\n    instruction=HARNESS_PREAMBLE + \"\"\"You are the Drafter Agent \u2014 the sole compiler of the Legal Abstract Syntax Tree (AST) AND the data flow bridge of the entire Clausely system.\n\nCRITICAL SAFETY DIRECTIVE: Since Gemini models are susceptible to legal hallucinations, you MUST call the `google_search_grounding` tool to verify the existence and details of any case precedent, statutory amendment, or procedural rule before mentioning it.\n\nIf ANY facts or context are ambiguous or missing, you must call the `ask_user_options` tool to present a multiple-choice question to the user (providing exactly 4-5 relevant choices plus \"Others\") to resolve the ambiguity. Do not make assumptions.\n\n## ROLE 1: EXCLUSIVE AST COMPILER\n1. You are the ONLY agent with write access to the Legal AST.\n2. No other agent (Petitioner, Reviewer, Judge, etc.) may directly modify the AST.\n3. You receive verified outputs from all 7 analysis agents and compile them.\n\n## ROLE 2: DATA FLOW BRIDGE (CRITICAL)\nYou are the bridge that connects three systems:\n\nA. DRAFT FEATURE (SYSTEM 1):\n   - You pull the current draft state, template selections, and clause structures.\n   - You push compiled AST mutations back to the drafter pipeline for formatting.\n   - You relay SFE validation results between the formatting engine and the swarm.\n\nB. CASE BASE (FEATURE 3):\n   - You pull ALL stored matters, precedent patterns, and institutional memory.\n   - You pull ALL written info (filed documents, strategy memos, reward signals).\n   - You pull ALL unwritten info (firm playbook preferences, custom rules, advocate notes).\n   - You push new simulation insights back into the case base for future reference.\n\nC. COMPLETE KNOWLEDGE BASE:\n   - You maintain the full case context across the entire strategist run.\n   - You ensure NO information is lost between agent handoffs.\n   - You carry forward every fact, citation, objection, and score from all agents.\n   - You are the single source of truth for the current simulation state.\n\n## COMPILATION PROCESS\n1. INTAKE: Receive all agent outputs (arguments, objections, citations, scores).\n2. BRIDGE: Pull relevant case base history and draft state into context.\n3. VALIDATE: Cross-check that every citation referenced by other agents was grounded.\n4. STRUCTURE: Organize into court-mandated section order for the jurisdiction.\n5. FORMAT: Apply Symbolic Formatting Engine (SFE) rules:\n   - Exact margins (3.0cm left, 2.5cm right for Maharashtra District)\n   - Correct fonts (Times New Roman, 14pt body)\n   - Line spacing (1.5x District, 2.0x High Court)\n   - Mandatory sections (cause title, verification, prayer)\n6. COMPILE: Produce the final Legal AST JSON with all nodes marked as grounded.\n7. SYNC: Push compiled output back to Draft Feature and Case Base.\n8. AUDIT: Emit compilation report with section-by-section SFE pass/fail.\n\nOutput format:\n- AST_COMPILATION_STATUS: PASS / FAIL\n- DATA_BRIDGE_STATUS: All systems synced / [list of sync failures]\n- SECTIONS_COMPILED: [list with status per section]\n- CASE_BASE_INSIGHTS_USED: [list of retrieved precedents/playbook rules]\n- SFE_VIOLATIONS: [list of formatting defects]\n- FINAL_ACCEPTANCE_SCORE: X/100\n- COMPILATION_NOTES: [any issues or warnings]\n\nYou are the last gate before filing. If ANY upstream agent's output is UNVERIFIED,\nyou MUST flag it and refuse to compile that section into the AST.\n\"\"\",\n)\n\n# ---------------------------------------------------------------------------\n# ADK Multi-Agent Assembly\n# ---------------------------------------------------------------------------\n\n# Run 7 analysis agents sequentially to prevent OpenTelemetry contextvar conflicts\nanalysis_swarm = Workflow(\n    name=\"adversarial_swarm\",\n    description=\"7-agent sequential adversarial legal analysis swarm\",\n    edges=[\n        Edge(from_node=START, to_node=petitioner_agent),\n        Edge(from_node=petitioner_agent, to_node=opponent_agent),\n        Edge(from_node=opponent_agent, to_node=reviewer_agent),\n        Edge(from_node=reviewer_agent, to_node=verifier_agent),\n        Edge(from_node=verifier_agent, to_node=objector_agent),\n        Edge(from_node=objector_agent, to_node=presenter_agent),\n        Edge(from_node=presenter_agent, to_node=judge_agent),\n    ],\n)\n\n# Then Drafter compiles all verified outputs into the Legal AST\nstrategist_agent = Workflow(\n    name=\"clausely_strategist\",\n    description=(\n        \"Full 8-agent strategic simulation with adversarial self-play. \"\n        \"Runs 7 analysis agents sequentially, then the Drafter Agent \"\n        \"compiles all verified outputs into the Legal AST.\"\n    ),\n    edges=[\n        Edge(from_node=START, to_node=analysis_swarm),\n        Edge(from_node=analysis_swarm, to_node=strategist_drafter_agent),\n    ],\n)\n", "agents/case_base.py": "\"\"\"\nClausely Case Base Agent \u2014 Persistent Legal Memory with Firestore.\n\nUses Firestore for persistent storage of:\n- Matters (documents, scores, strategy memos)\n- Reward signals (RL feedback from filing outcomes)\n- Firm playbooks (custom rules per law firm)\n\nThis is the institutional memory moat \u2014 Clausely gets smarter with\nevery matter processed.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport os\nimport json\nimport logging\nimport uuid\nfrom datetime import datetime\nfrom typing import Any, Dict, List, Optional\n\nfrom google.adk.agents import Agent\nfrom google.adk.tools import FunctionTool\n\nlogger = logging.getLogger(\"clausely.case_base\")\n\n\n# ---------------------------------------------------------------------------\n# Firestore client (lazy, with in-memory fallback)\n# ---------------------------------------------------------------------------\n\n_firestore_db = None\n_in_memory_store: Dict[str, Dict[str, Any]] = {\n    \"matters\": {},\n    \"reward_signals\": [],\n    \"playbooks\": {},\n}\n\n\ndef _get_db():\n    \"\"\"Lazily initialize Firestore client.\"\"\"\n    global _firestore_db\n    if _firestore_db is not None:\n        return _firestore_db\n    try:\n        import firebase_admin\n        from firebase_admin import credentials, firestore\n        if not firebase_admin._apps:\n            cred_path = os.getenv(\"GOOGLE_APPLICATION_CREDENTIALS\")\n            if cred_path and os.path.exists(cred_path):\n                cred = credentials.Certificate(cred_path)\n                firebase_admin.initialize_app(cred)\n            else:\n                firebase_admin.initialize_app()\n        _firestore_db = firestore.client()\n        return _firestore_db\n    except Exception as e:\n        logger.warning(f\"Firestore unavailable, using in-memory store: {e}\")\n        return None\n\n\n# ---------------------------------------------------------------------------\n# ADK FunctionTool definitions\n# ---------------------------------------------------------------------------\n\ndef save_matter_to_case_base(\n    matter_id: str,\n    document_type: str,\n    jurisdiction: str,\n    document_text: str,\n    acceptance_score: float,\n    strategy
